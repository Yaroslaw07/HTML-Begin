    <body>
        <div class = "Player">
            <p style="margin-top: 40px;">Player 1:</p>
            <div class="card_hand">
                <a>2♣</a>

                <a style="color:brown">3♥</a>

                <a>10♣</a>
                <a style="color:brown">K♦</a>

            </div>
        </div>
