<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Card game</title>
        <link rel="stylesheet" href="style.css">   
    </head>
    <body>
        <div class = "Player">
            <p style="margin-top: 40px;">Player 1:</p>
            <div class="card_hand">
                <span>2♣</span>
                <span style="color:brown">9♥</span>
                <span style="color:brown">6♥</span>
                <span style="color:brown">A♦</span>
                <span>Q♠</span>
                <span>J♣</span>
            </div>
        </div>

        <div class = "Player">
            <p>Player 2:</p>
            <div class="card_hand">
                <span style="color:brown">3♥</span>
                <span>A♣</span>
                <span>10♣</span>
                <span style="color:brown">K♦</span>
                <span>8♠</span>
                <span style="color:brown">3♥</span>
            </div>
        </div>


    </body>
</html>
